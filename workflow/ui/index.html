<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Human Concierge Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        header {
            background: #1f2937;
            color: white;
            padding: 16px 24px;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 24px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f9fafb;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .escalate {
            background: #fee2e2;
            color: #b91c1c;
        }

        .cleared {
            background: #dcfce7;
            color: #166534;
        }

        .pending {
            background: #fef9c3;
            color: #854d0e;
        }

        .resolve-btn {
            background: #10b981;
            padding: 6px 10px;
            font-size: 12px;
        }

        .resolve-btn:hover {
            background: #059669;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
    </style>
</head>

<body>

<header>
    🏥 Human Concierge Dashboard
</header>

<div class="container">

    <div class="toolbar">
        <h3>Human Concierge: Escalations to Resolve</h3>
        <button onclick="loadData()">Refresh</button>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Patient</th>
            <th>Status</th>
            <th>Stage</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>
const API = "http://127.0.0.1:8000";

async function loadData() {
    const res = await fetch(`${API}/exceptions`);
    const data = await res.json();

    const body = document.getElementById("tableBody");
    body.innerHTML = "";

    if (data.length === 0) {
        body.innerHTML = `
            <tr>
                <td colspan="5" class="empty">No escalations 🎉</td>
            </tr>
        `;
        return;
    }

    data.forEach(item => {

        body.innerHTML += `
        <tr>
            <td>${item.id}</td>
            <td>${item.patient}</td>
            <td>
                <span class="badge escalate">${item.status}</span>
            </td>
            <td>${item.stage}</td>
            <td>
                <button class="resolve-btn" onclick="resolve(${item.id})">
                    Resolve
                </button>
            </td>
        </tr>
        `;
    });
}

async function resolve(id) {
    await fetch(`${API}/resolve/${id}`, {
        method: "POST"
    });

    loadData();
}

// initial load
loadData();
</script>

</body>
</html>
